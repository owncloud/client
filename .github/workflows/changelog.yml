name: Changelog

on:
  pull_request:
  push:
    branches: [ master ]
    tags: [ "*" ]

permissions: {}

jobs:
  changelog:
    uses: owncloud/reusable-workflows/.github/workflows/calens.yml@main
    secrets:
      CALENS_APP_ID: ${{ secrets.CALENS_APP_ID }}
      CALENS_APP_PRIVATE_KEY: ${{ secrets.CALENS_APP_PRIVATE_KEY }}
